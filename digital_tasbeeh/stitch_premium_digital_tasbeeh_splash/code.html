<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "emerald-dark": "#071A17",
                        "emerald-mid": "#0B2E2A",
                        "emerald-deep": "#041412",
                        "gold-start": "#D4AF37",
                        "gold-end": "#F7E27D",
                        "secondary-fixed-dim": "#55e16b",
                        "on-tertiary-fixed-variant": "#574500",
                        "error-container": "#93000a",
                        "outline": "#8b9290",
                        "primary-fixed": "#c8e9e3",
                        "inverse-on-surface": "#2f3130",
                        "outline-variant": "#414847",
                        "surface-container-high": "#292a2a",
                        "on-background": "#e3e2e1",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#3c2f00",
                        "surface-variant": "#343534",
                        "on-secondary-fixed-variant": "#005319",
                        "on-error": "#690005",
                        "surface-dim": "#121413",
                        "background": "#121413",
                        "primary": "#accdc7",
                        "on-surface": "#e3e2e1",
                        "on-primary-container": "#779892",
                        "primary-container": "#0f2f2b",
                        "primary-fixed-dim": "#accdc7",
                        "tertiary-fixed-dim": "#e9c349",
                        "inverse-surface": "#e3e2e1",
                        "tertiary-container": "#cca730",
                        "on-tertiary-container": "#4f3d00",
                        "surface-container-lowest": "#0d0f0e",
                        "on-primary-fixed": "#00201d",
                        "on-secondary-container": "#00370e",
                        "surface": "#121413",
                        "secondary-container": "#02ad3f",
                        "surface-tint": "#accdc7",
                        "surface-bright": "#383939",
                        "on-surface-variant": "#c1c8c6",
                        "on-primary-fixed-variant": "#2e4c48",
                        "tertiary-fixed": "#ffe088",
                        "surface-container-low": "#1a1c1b",
                        "surface-container-highest": "#343534",
                        "tertiary": "#e9c349",
                        "on-tertiary-fixed": "#241a00",
                        "secondary-fixed": "#73fe84",
                        "secondary": "#55e16b",
                        "on-secondary": "#00390f",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#002106",
                        "on-primary": "#163531",
                        "inverse-primary": "#45645f",
                        "surface-container": "#1e201f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "safe-area-bottom": "40px",
                        "inline-gap": "16px",
                        "stack-gap": "24px",
                        "container-padding": "32px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "label-caps": ["manrope"],
                        "body-md": ["manrope"],
                        "display-lg": ["notoSerif"],
                        "title-sm": ["manrope"],
                        "headline-md": ["notoSerif"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.1em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "title-sm": ["18px", {"lineHeight": "1.5", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["28px", {"lineHeight": "1.3", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .islamic-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l2.5 7.5L40 10l-7.5 2.5L30 20l-2.5-7.5L20 10l7.5-2.5L30 0zM0 30l2.5 7.5L10 40l-7.5 2.5L0 50l-2.5-7.5L-10 40l7.5-2.5L0 30zM60 30l2.5 7.5L70 40l-7.5 2.5L60 50l-2.5-7.5L50 40l7.5-2.5L60 30zM30 60l2.5 7.5L40 70l-7.5 2.5L30 80l-2.5-7.5L20 70l7.5-2.5L30 60z' fill='%23accdc7' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        @keyframes entrance {
            0% { transform: translateY(-100px) rotate(-5deg); opacity: 0; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 1; }
        }

        @keyframes breathing {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
            50% { transform: translateY(-10px) rotate(1deg) scale(1.02); }
        }

        @keyframes particle-float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        @keyframes shimmer-text {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        @keyframes halo-pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        .animate-entrance {
            animation: entrance 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .animate-premium-float {
            animation: breathing 8s ease-in-out infinite 1.5s;
        }

        .text-gold-gradient {
            background: linear-gradient(90deg, #D4AF37 0%, #F7E27D 25%, #D4AF37 50%, #F7E27D 75%, #D4AF37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-text 6s linear infinite;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        .vignette {
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
        }

        .fade-in-premium {
            opacity: 0;
            animation: fadeIn 2s ease-out 2s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 0.6; transform: translateY(0); }
        }

        body {
            min-height: max(884px, 100dvh);
            background-color: #041412;
        }
    </style>
</head>
<body class="text-on-surface selection:bg-gold-start/30 overflow-hidden">
<main class="relative w-full h-screen flex flex-col items-center justify-center bg-[radial-gradient(circle_at_center,_#0B2E2A_0%,_#071A17_40%,_#041412_100%)] px-container-padding overflow-hidden">
<!-- Vignette & Pattern Overlay -->
<div class="absolute inset-0 vignette pointer-events-none"></div>
<div class="absolute inset-0 islamic-pattern pointer-events-none"></div>
<!-- Floating Particles -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="particle animate-[particle-float_15s_linear_infinite]" style="left: 10%; bottom: 0;"></div>
<div class="particle animate-[particle-float_20s_linear_infinite_2s]" style="left: 30%; bottom: 0;"></div>
<div class="particle animate-[particle-float_18s_linear_infinite_5s]" style="left: 70%; bottom: 0;"></div>
<div class="particle animate-[particle-float_22s_linear_infinite_1s]" style="left: 90%; bottom: 0;"></div>
</div>
<!-- Central Radial Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/10 rounded-full blur-[140px] pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center gap-stack-gap">
<!-- Glassmorphism Panel + Tasbeeh Counter -->
<div class="relative flex items-center justify-center w-72 h-72 md:w-96 md:h-96">
<!-- Glass Background -->
<div class="absolute inset-0 glass-panel rounded-[4rem] transform scale-90 opacity-60"></div>
<!-- Tasbeeh Device Wrapper with Entrance & Float -->
<div class="relative animate-entrance">
<div class="animate-premium-float relative">
<!-- Glow & Highlights -->
<div class="absolute inset-0 bg-secondary-fixed-dim/20 blur-[40px] rounded-full scale-75 animate-pulse"></div>
<!-- The Device Image -->
<div class="relative p-8 group">
<img alt="Luxury Digital Tasbeeh" class="w-64 h-64 md:w-80 md:h-80 object-contain drop-shadow-[0_0_30px_rgba(85,225,107,0.3)] filter brightness-110" src="https://lh3.googleusercontent.com/aida/ADBb0uiA7yVpmtLQwKBOHgvDJq1aXfzIol5EEdWwYLTOi90LAo6Ks0OcAFdTIZvgGxDHfvyuovEtGuvMOJROYJ0CBcoMBG24-xxA1C5JCTDfo27x6ooC3z3Z7X0Hqriq8heWHxse1aEAbnVCMcR7m2_AlrZZSNUcFMXIr5LesTZbEa7t56AUir-ow_ENWfr6q61imh2iY52_MGgbujl4XLI6WQwP5eYMTj1NFxavwFhKBP-byWv2qOGv0WanUsE"/>
<!-- Overlay for '33' on device screen area -->
<div class="absolute top-[34%] left-[45%] -translate-x-1/2 -translate-y-1/2">
<span class="font-mono text-3xl md:text-4xl text-[#A5F3FC] opacity-90 drop-shadow-[0_0_8px_rgba(165,243,252,0.8)] animate-pulse">33</span>
</div>
<!-- Light Gold Rim Highlight (SVG overlay for precision) -->
<div class="absolute inset-0 rounded-full border-[0.5px] border-gold-end/20 pointer-events-none group-hover:border-gold-end/40 transition-colors duration-1000"></div>
</div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="text-center space-y-4">
<h1 class="font-display-lg text-5xl md:text-6xl text-gold-gradient tracking-tight drop-shadow-sm">
                Digital Tasbeeh
            </h1>
<p class="font-body-md text-on-surface-variant fade-in-premium max-w-xs mx-auto">
                Count Your Dhikr with Peace
            </p>
</div>
</div>
<!-- Lower Elements: Premium Loader -->
<div class="absolute bottom-safe-area-bottom flex flex-col items-center gap-6">
<!-- Pulse Halo Loader -->
<div class="relative w-12 h-12 flex items-center justify-center">
<div class="absolute w-full h-full border-2 border-gold-start/30 rounded-full animate-[halo-pulse_3s_ease-in-out_infinite]"></div>
<div class="absolute w-8 h-8 border border-gold-end/20 rounded-full animate-[halo-pulse_3s_ease-in-out_infinite_1.5s]"></div>
<div class="w-1.5 h-1.5 bg-gold-end rounded-full shadow-[0_0_10px_#F7E27D]"></div>
</div>
<!-- Branding -->
<span class="font-label-caps text-[10px] text-gold-start/40 tracking-[0.4em] uppercase">
            SubhanAllah Sanctuary
        </span>
</div>
</main>
</body></html>
