name: task_manager
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.2.8+4
  path_provider: ^2.0.15
  provider: ^6.0.5 # For State Management
  intl: ^0.18.1 # For date formatting
  csv: ^5.0.1 # To generate CSV content
  mailer: ^6.0.0 # To send email (requires setup, simplified here)
  share_plus: ^7.0.2 # To share the exported file
  shared_preferences: ^2.2.0
  # Note: Actual email sending (mailer) requires a dedicated server setup,
  # so we will focus on generating the file and using share_plus for sending.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
